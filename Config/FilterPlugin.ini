[FilterPlugin]
; VibeUE — FilterPlugin.ini
; Lists every file/folder OUTSIDE the standard plugin structure that must ship in the Fab package.
;
; Auto-included by UAT BuildPlugin (do NOT list these):
;   - the .uplugin
;   - Source/
;   - Content/
;   - Resources/
; Excluded automatically (build artifacts / rebuilt on target):
;   - Binaries/
;   - Intermediate/
;
; Everything else — top-level files, and anything under Config/, Docs/, etc. —
; is NOT packaged unless explicitly listed below.

; Top-level readme (user-facing)
/README.md

; Test prompts and examples (user reference)
/test_prompts/...
